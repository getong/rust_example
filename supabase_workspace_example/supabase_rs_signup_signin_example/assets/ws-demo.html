<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supabase Axum WebSocket Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --card: #fffaf2;
        --ink: #1b1b18;
        --muted: #645f57;
        --accent: #0b6e4f;
        --accent-2: #b85c38;
        --border: rgba(27, 27, 24, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top left, rgba(184, 92, 56, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(11, 110, 79, 0.2), transparent 24%),
          var(--bg);
        color: var(--ink);
      }

      main {
        width: min(880px, calc(100% - 32px));
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 24px 80px rgba(27, 27, 24, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 0.96;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 1rem;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
      }

      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.7);
        font-size: 0.92rem;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 18px;
      }

      .auth-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.9);
      }

      .token-row {
        margin-bottom: 18px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        background: var(--accent);
        color: white;
      }

      button.secondary {
        background: var(--accent-2);
      }

      button.ghost {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--border);
      }

      pre {
        margin: 0;
        padding: 18px;
        min-height: 320px;
        border-radius: 18px;
        background: #151816;
        color: #dde7dd;
        overflow: auto;
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      @media (max-width: 700px) {
        .auth-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Axum WebSocket / WSS Demo</h1>
      <p>
        This page talks to <code>/ws</code>. The socket now requires a Supabase Auth access token,
        and the local app prefers HTTPS/WSS automatically when repo-local dev certs exist.
      </p>
      <div class="meta">
        <div class="pill" id="protocol-pill">Protocol: pending</div>
        <div class="pill" id="status-pill">Socket: disconnected</div>
        <div class="pill" id="auth-pill">Auth: waiting for token</div>
      </div>
      <div class="auth-grid">
        <label>
          Supabase Email
          <input id="email" type="email" autocomplete="username" placeholder="demo@example.com" />
        </label>
        <label>
          Supabase Password
          <input id="password" type="password" autocomplete="current-password" placeholder="super-secret-password" />
        </label>
      </div>
      <div class="controls">
        <button id="signin">Sign In for Token</button>
      </div>
      <div class="token-row">
        <label>
          Supabase Access Token
          <input id="token" type="text" spellcheck="false" placeholder="Paste an access token or use Sign In for Token" />
        </label>
      </div>
      <div class="controls">
        <button id="connect">Connect Socket</button>
        <button id="disconnect" class="ghost">Disconnect</button>
        <button id="send-json">Send JSON</button>
        <button id="send-binary" class="secondary">Send JSON Blob</button>
      </div>
      <pre id="log"></pre>
    </main>
    <script src="/assets/ws-demo.js"></script>
  </body>
</html>
