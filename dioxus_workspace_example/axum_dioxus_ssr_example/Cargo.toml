[package]
name = "axum_dioxus_ssr_example"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8"
dioxus = { version = "0.7.3", features = ["ssr"] }
dioxus-ssr = "0.7.3"
http = "1.4.0"
tokio = { version = "1.50", features = ["full"] }
tower-http = { version = "0.6.8", features = ["fs"] }
web-sys = { version = "0.3.91", features = [
  "Document",
  "console",
  "HtmlDocument",
  "Window",
  "Event",
  "AddEventListenerOptions",
  "Navigator",
] }
