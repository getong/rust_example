[package]
name = "dioxus_web_basic_example"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
dioxus = { version = "0.7.3", default-features = false, features = ["minimal"] }
dioxus-web = "0.7.3"
fermi = "0.4.3"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dioxus-desktop = { version = "0.7.3", default-features = false, features = ["tokio_runtime"] }

[features]
default = []
server = ["dioxus/server"]
web = ["dioxus/web"]
