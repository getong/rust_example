[package]
name = "sqlx_sqlite_example"
version = "0.1.0"
edition = "2024"

[dependencies]
sqlx = { version = "0.9", default-features = false, features = [
    "chrono",
    "json",
    "macros",
    "migrate",
    "runtime-tokio",
    "sqlite-bundled",
    "time",
    "tls-rustls",
    "uuid",
  ] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
