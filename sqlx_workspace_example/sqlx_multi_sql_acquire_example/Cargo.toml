[package]
name = "sqlx_multi_sql_acquire_example"
version = "0.1.0"
edition = "2021"

[dependencies]
chrono = "0.4.45"
dotenv = "0.15.0"
rand = "0.10.1"
sqlx = { version = "0.9", features = [
  "runtime-tokio",
  "postgres",
  "chrono",
  "any",
  "bigdecimal",
] }
tokio = { version = "1.52.3", features = ["full"] }
