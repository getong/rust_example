[package]
name = "sqlx_multi_sql_transaction_example"
version = "0.1.0"
edition = "2021"

[dependencies]
chrono = "0.4.44"
dotenv = "0.15.0"
rand = "0.10.1"
sqlx = { version = "0.8", features = [
  "runtime-tokio-native-tls",
  "postgres",
  "chrono",
  "any",
  "bigdecimal",
] }
tokio = { version = "1.52.1", features = ["full"] }
