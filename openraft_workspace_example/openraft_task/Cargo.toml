[package]
name = "openraft_task"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
apalis = { version = "1.0.0-rc.9", features = ["retry"] }
apalis-core = "1.0.0-rc.9"
byteorder = "1.5.0"
clap = { version = "4.6.1", features = ["derive"] }
futures = "0.3.32"
openraft = { version = "0.10.0-alpha.25", features = [
  "serde",
  "type-alias",
] }
rand = "0.10"
rocksdb = "0.24.0"
serde = { version = "1.0.228", features = ["derive"] }
sonic-rs = "0.5.8"
tokio = { version = "1.52", default-features = false, features = [
  "macros",
  "rt-multi-thread",
  "sync",
  "time",
] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3.27.0"
