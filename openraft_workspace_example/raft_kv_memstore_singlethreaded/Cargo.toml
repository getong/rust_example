[package]
name = "raft_kv_memstore_singlethreaded"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
futures = "0.3.32"
openraft = { version = "0.10.0-alpha.18", features = [
  "serde",
  "type-alias",
] }
openraft-legacy = { version = "0.10.0-alpha.18" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", default-features = false, features = ["sync"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[dev-dependencies]
maplit = "1.0.2"
