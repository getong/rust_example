[package]
name = "raft_kv_rocksdb"
version = "0.1.0"
edition = "2024"

[features]
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix-web = "4.13.0"
byteorder = "1.5.0"
clap = { version = "4.6.1", features = ["derive", "env"] }
client-http = { path = "../client-http" }
futures = "0.3.32"
network-v1-http = { path = "../network-v1-http" }
openraft = { version = "0.10.0-alpha.18", features = [
  "serde",
  "type-alias",
  "serde_json",
] }
openraft-legacy = { version = "0.10.0-alpha.18" }
openraft-rocksstore = { path = "../rocksstore" }
reqwest = { version = "0.13", features = ["json"] }
rocksdb = "0.24.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
types-kv = { path = "../types-kv" }

[dev-dependencies]
maplit = "1.0.2"
tempfile = { version = "3.27.0" }
