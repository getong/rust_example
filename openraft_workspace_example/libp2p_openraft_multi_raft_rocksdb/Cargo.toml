[package]
name = "libp2p_openraft_multi_raft_rocksdb"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "lpmr-kv"
path = "src/bin/kv.rs"

[[bin]]
name = "lpmr-peer-id"
path = "src/bin/peer_id.rs"

[[bin]]
name = "lpmr-status"
path = "src/bin/status.rs"

[dependencies]
anyhow = "1.0.102"
apalis = { version = "1.0.0-rc.9", features = ["retry"] }
apalis-codec = { version = "0.1.0-rc.9", features = ["json"] }
apalis-core = "1.0.0-rc.9"
async-trait = "0.1.89"
axum = { version = "0.8.9", features = ["json"] }
clap = { version = "4.6.1", features = ["derive"] }
futures = "0.3.32"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "50306daea5f47e0f6ac7968d7376e4cee5e6b655", features = [
  "full",
] }
once_cell = "1.21.4"
openraft = { version = "0.10.0-alpha.22", features = [
  "serde",
  "type-alias",
] }
# openraft-legacy = { version="0.10.0-alpha.17" }
openraft-rocksstore-crud = { path = "../rocksstore_crud" }
prost = "0.14.3"
rand = "0.10"
rocksdb = "0.24.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52", default-features = false, features = [
  "io-util",
  "macros",
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
types-kv = { path = "../types-kv" }

[build-dependencies]
prost-build = "0.14.3"

[dev-dependencies]
tempfile = "3.27.0"
