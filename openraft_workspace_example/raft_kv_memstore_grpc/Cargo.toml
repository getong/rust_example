[package]
name = "raft_kv_memstore_grpc"
version = "0.1.0"
edition = "2024"

[dependencies]
bincode = "=2"
clap = { version = "4.6.1", features = ["derive", "env"] }
dashmap = "6.1.0"
futures = "0.3.32"
log-mem = { path = "../log-mem", features = [] }
mem-log = { path = "../mem-log" }
openraft = { version = "0.10.0-alpha.18", default-features = false, features = [
  "type-alias",
] }
prost = "0.14.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.1", features = ["full"] }
tonic = "0.14.5"
tonic-prost = "0.14.5"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[build-dependencies]
prost-build = "0.14.3"
tonic-prost-build = "0.14.5"
