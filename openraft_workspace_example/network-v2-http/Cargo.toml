[package]
name = "network-v2-http"
version = "0.1.0"
readme = "README.md"
edition = "2024"

[dependencies]
openraft = { version = "0.10.0-alpha.27", features = ["serde", "type-alias"] }

bytes = "1.0"
http-body-util = "0.1"
hyper = { version = "1.0", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
log = "0.4"
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["full"] }

[features]
default = []

[package.metadata.docs.rs]
all-features = true
