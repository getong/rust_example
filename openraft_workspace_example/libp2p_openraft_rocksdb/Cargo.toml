[package]
name = "libp2p_openraft_rocksdb"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
axum = { version = "0.8.9", features = ["json"] }
clap = { version = "4.6.1", features = ["derive"] }
futures = "0.3.32"
kameo = { version = "0.20.0", features = ["remote"] }
libp2p = { version = "0.56", features = [
  "cbor",
  "dns",
  "gossipsub",
  "identify",
  "json",
  "kad",
  "macros",
  "mdns",
  "noise",
  "ping",
  "quic",
  "request-response",
  "serde",
  "tcp",
  "tls",
  "tokio",
  "websocket",
  "yamux",
] }
openraft = { version = "0.10.0-alpha.18", features = [
  "serde",
  "type-alias",
] }
# openraft-legacy = { version="0.10.0-alpha.17" }
openraft-rocksstore-crud = { path = "../rocksstore_crud" }
prost = "0.14.3"
rand = "0.10"
rocksdb = "0.24.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52", default-features = false, features = [
  "io-util",
  "macros",
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
types-kv = { path = "../types-kv" }

[build-dependencies]
prost-build = "0.14.3"
