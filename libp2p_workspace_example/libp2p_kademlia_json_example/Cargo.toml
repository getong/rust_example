[package]
name = "libp2p_kademlia_json_example"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4.44"
env_logger = "0.11.10"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "deaa96ccaf3e6bd518bfc346fb8c0d24d195461e", features = [
  "full",
] }
log = "0.4.29"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1", features = ["full"] }
