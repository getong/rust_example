[package]
name = "libp2p_kademlia_json_example"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4.44"
env_logger = "0.11.10"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "3e72d4c071d5ec8815d2f6f7ee3602600ff51798", features = [
  "full",
] }
log = "0.4.29"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1", features = ["full"] }
