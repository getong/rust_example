[package]
name = "libp2p_kademlia_json_example"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4.45"
env_logger = "0.11.11"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "891bf049c63f65a1b9500b00c6d0a39afae175a2", features = [
  "full",
] }
log = "0.4.33"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1", features = ["full"] }
