[package]
name = "libp2p_tokio_stream_with_existing_key_example"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
futures = "0.3.32"
hex = "0.4.3"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "deaa96ccaf3e6bd518bfc346fb8c0d24d195461e", features = [
  "full",
] }
libp2p-stream = { git = "https://github.com/libp2p/rust-libp2p", rev = "deaa96ccaf3e6bd518bfc346fb8c0d24d195461e" }
rand = "0.10.1"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
