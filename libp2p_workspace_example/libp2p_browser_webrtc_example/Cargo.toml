[package]
name = "libp2p_browser_webrtc_example"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0.102"
futures = "0.3.32"
rand = "=0.8.5"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
axum = "0.8.9"
libp2p = { version = "0.56", features = ["ed25519", "macros", "ping", "tokio"] }
libp2p-webrtc = { version = "0.9.0-alpha.1", features = ["tokio"] }
rust-embed = { version = "8.11.0", features = [
  "include-exclude",
  "interpolate-folder-path",
] }
tokio = { version = "1.52.3", features = ["macros", "net", "rt", "signal"] }
tokio-util = { version = "0.7.18", features = ["compat"] }
tower = "0.5.3"
tower-http = { version = "0.6.10", features = ["cors"] }
mime_guess = "2.0.5"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3.98"
libp2p = { version = "0.56", features = [
  "ed25519",
  "macros",
  "ping",
  "wasm-bindgen",
] }
libp2p-webrtc-websys = { version = "0.4" }
tracing-wasm = "0.2.1"
wasm-bindgen = "0.2.121"
wasm-bindgen-futures = "0.4.71"
web-sys = { version = "0.3.98", features = [
  "Document",
  "Element",
  "HtmlElement",
  "Node",
  "Response",
  "Window",
] }

[lints]
rust.unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(wasm_bindgen_unstable_test_coverage)',
] }
