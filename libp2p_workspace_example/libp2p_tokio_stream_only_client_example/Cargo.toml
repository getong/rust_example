[package]
name = "libp2p_tokio_stream_only_client_example"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
futures = "0.3.32"
hex = "0.4.3"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "3e72d4c071d5ec8815d2f6f7ee3602600ff51798", features = [
  "full",
] }
libp2p-stream = { git = "https://github.com/libp2p/rust-libp2p", rev = "3e72d4c071d5ec8815d2f6f7ee3602600ff51798" }
rand = "0.10.1"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
