[package]
name = "libp2p_authenticate_example"
version = "0.1.0"
edition = "2021"

[dependencies]
either = "1.16.0"
env_logger = "0.11.10"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "3e72d4c071d5ec8815d2f6f7ee3602600ff51798", features = [
  "full",
] }
log = "0.4.29"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
