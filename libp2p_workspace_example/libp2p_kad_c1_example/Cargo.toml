[package]
name = "libp2p_kad_c1_example"
version = "0.1.0"
edition = "2024"

[dependencies]
alloy = "2.0.5"
anyhow = "1.0.102"
futures = "0.3.32"
hex = "0.4.3"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "deaa96ccaf3e6bd518bfc346fb8c0d24d195461e", features = [
  "full",
] }
secp256k1 = { version = "0.31.1", features = [
  "alloc",
  "std",
  "hashes",
  "rand",
  "serde",
] }
tokio = { version = "1.52.3", features = ["full"] }
