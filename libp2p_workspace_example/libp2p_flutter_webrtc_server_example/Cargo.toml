[package]
name = "libp2p_flutter_webrtc_server_example"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.103"
futures = "0.3.32"
libp2p = { version = "0.56", features = [
  "ed25519",
  "macros",
  "request-response",
  "tokio",
] }
libp2p-request-response = { version = "0.29.0", features = ["cbor"] }
libp2p-webrtc = { version = "0.9.0-alpha.1", features = ["tokio"] }
rand = "=0.8.5"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.52.3", features = ["macros", "rt", "signal"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
