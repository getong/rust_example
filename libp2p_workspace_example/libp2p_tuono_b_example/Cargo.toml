[package]
name = "libp2p_tuono_b_example"
version = "0.0.1"
edition = "2021"

# [[bin]]
# name = "tuono"
# path = ".tuono/main.rs"
[[bin]]
name = "main"
path = "src/bin/main.rs"

[dependencies]
alloy = "1.1.3"
anyhow = "1.0.100"
futures = "0.3.31"
hex = "0.4.3"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "3e72d4c071d5ec8815d2f6f7ee3602600ff51798", features = [
  "full",
] }
secp256k1 = { version = "0.31.1", features = [
  "alloc",
  "std",
  "hashes",
  "rand",
  "serde",
] }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.48.0", features = ["full"] }
tuono_lib = "0.19.7"
