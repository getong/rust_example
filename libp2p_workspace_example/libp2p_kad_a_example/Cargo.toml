[package]
name = "libp2p_kad_a_example"
version = "0.1.0"
edition = "2024"

[dependencies]
alloy = "2.1.0"
anyhow = "1.0.103"
futures = "0.3.32"
hex = "0.4.3"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "891bf049c63f65a1b9500b00c6d0a39afae175a2", features = [
  "full",
] }
secp256k1 = { version = "0.31.1", features = [
  "alloc",
  "std",
  "hashes",
  "rand",
  "serde",
] }
tokio = { version = "1.52.3", features = ["full"] }
