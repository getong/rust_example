[package]
name = "libp2p_lookup"
version = "0.1.0"
edition = "2024"

[dependencies]
ansi_term = "0.12.1"
clap = { version = "4.5.35", features = ["derive"] }
env_logger = "0.11.8"
futures = "0.3.31"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "3e72d4c071d5ec8815d2f6f7ee3602600ff51798", features = [
  "full",
] }
log = "0.4.27"
structopt = "0.3.26"
thiserror = "2.0.12"
tokio = { version = "1.44.1", features = ["full"] }
