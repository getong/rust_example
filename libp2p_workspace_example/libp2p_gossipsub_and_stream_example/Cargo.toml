[package]
name = "libp2p_gossipsub_and_stream_example"
version = "0.1.0"
edition = "2021"

[dependencies]
either = "1.16.0"
env_logger = "0.11.11"
libp2p = { git = "https://github.com/libp2p/rust-libp2p", rev = "891bf049c63f65a1b9500b00c6d0a39afae175a2", features = [
  "full",
] }
libp2p-stream = { git = "https://github.com/libp2p/rust-libp2p", rev = "891bf049c63f65a1b9500b00c6d0a39afae175a2" }
log = "0.4.33"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
