[package]
name = "spider_clickhouse_example"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.9"
clickhouse = { version = "0.15.0", features = ["lz4", "rustls-tls"] }
dotenvy = "0.15"
hyper-rustls = { version = "0.27", default-features = true }
hyper-util = { version = "0.1", features = ["client-legacy", "http1", "tokio"] }
once_cell = "1.21.4"
redis = { version = "1.2", features = ["tokio-comp", "cluster-async"] }
reqwest = { version = "0.13", default-features = false, features = [
  "rustls",
  "http2",
  "charset",
  "gzip",
  "brotli",
  "deflate",
] }
rustls = "0.23"
rustls-native-certs = "0.8"
rustls-pemfile = "2.2"
scraper = "0.27.0"
serde = { version = "1.0.228", features = ["derive"] }
spider = "2.51.181"
tokio = { version = "1.52.3", features = ["full"] }
url = "2.5"
