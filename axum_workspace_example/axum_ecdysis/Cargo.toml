[package]
name = "axum_ecdysis"
version = "0.1.0"
edition = "2024"

[features]
default = ["systemd_sockets"]
systemd_notify = ["ecdysis/systemd_notify"]
systemd_sockets = ["ecdysis/systemd_sockets"]

[dependencies]
axum = "0.8.9"
ecdysis = "1.1.1"
env_logger = "0.11.10"
futures = "0.3.32"
http = "1.4.1"
hyper = { version = "1.10.1", features = ["full"] }
hyper-util = { version = "0.1.20", features = ["server", "http1", "http2", "tokio"] }
log = "0.4.30"
nix = { version = "0.31.3", features = ["process"] }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
tower = { version = "0.5.3", features = ["util"] }
waitgroup = "0.1.2"
