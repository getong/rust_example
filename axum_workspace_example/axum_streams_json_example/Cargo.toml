[package]
name = "axum_streams_json_example"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8.9"
axum-streams = { version = "0.25.0", features = ["json", "protobuf", "csv", "arrow", "text"] }
futures = "0.3.32"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.52.1", features = ["full"] }
tokio-stream = { version = "0.1.18", features = ["full"] }
