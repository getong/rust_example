[package]
name = "axum_tower_otel_http_example"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.9", features = ["http1", "tokio"] }
http-body-util = "0.1.3"
hyper = { version = "1.10.0", features = ["http1", "client"] }
opentelemetry = "0.32.0"
opentelemetry-otlp = { version = "0.32.0", features = ["grpc-tonic"] }
opentelemetry_sdk = "0.32.1"
pin-project = "1.1.13"
tokio = { version = "1.52.3", features = ["macros", "rt", "rt-multi-thread"] }
tower = "0.5.3"
tower-otel = { version = "0.10.0", features = ["axum"] }
tracing = "0.1.44"
tracing-opentelemetry = "0.33.0"
tracing-subscriber = "0.3.23"
