[package]
name = "p3-examples"
description = "Example implementations and demonstrations of Plonky3 STARK proof system components."
version = "0.5.1"
edition = "2024"

[dependencies]

clap = { version = "4.6.1", features = ["derive"] }
p3-air = "0.5.3"
p3-baby-bear = "0.5.3"
p3-blake3-air = "0.5.3"
p3-challenger = "0.5.3"
p3-circle = "0.5.3"
p3-commit = "0.5.3"
p3-dft = "0.5.3"
p3-field = "0.5.3"
p3-fri = "0.5.3"
p3-keccak = "0.5.3"
p3-keccak-air = "0.5.3"
p3-koala-bear = "0.5.3"
p3-matrix = "0.5.3"
p3-merkle-tree = "0.5.3"
p3-mersenne-31 = "0.5.3"
p3-monty-31 = "0.5.3"
p3-poseidon2 = "0.5.3"
p3-poseidon2-air = "0.5.3"
p3-symmetric = "0.5.3"
p3-uni-stark = "0.5.3"
postcard = { version = "1.1.3", default-features = false, features = ["alloc"] }
rand = { version = "0.10.1", default-features = false }
tracing-forest = { version = "0.3.1", features = ["ansi", "smallvec"] }
tracing-subscriber = { version = "0.3.23", default-features = false, features = [
  "alloc",
  "std",
  "env-filter",
] }
