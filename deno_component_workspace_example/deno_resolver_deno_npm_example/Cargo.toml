[package]
name = "deno_resolver_deno_npm_example"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22.1"
colored = "=2.2.0"
dashmap = "6.2"
deno_ast = { version = "=0.53.2", features = ["transpiling"] }
deno_core = "0.401.0"
deno_error = "=0.7.1"
deno_graph = "=0.108.2"
deno_lib = "0.66.0"
deno_napi = "0.179.0"
deno_node = "0.186.0"
deno_npm = "0.60.0"
deno_npm_cache = "0.67.0"
deno_npm_installer = "0.43.0"
deno_package_json = "0.50.0"
deno_permissions = "0.107.0"
deno_resolver = "0.79.0"
deno_runtime = { version = "0.256.0", features = ["transpile"] }
deno_semver = "=0.10.0"
deno_task_shell = "0.32.0"
dirs = "6.0.0"
eszip = "0.126.0"
flate2 = "1.1"
futures = "0.3"
hex = "0.4"
http = "1.4"
log = "0.4"
node_resolver = "0.86.0"
reqwest = { version = "0.13.3", features = ["json"] }
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha1 = "0.11"
sha2 = "0.11"
sys_traits = "0.1.28"
tar = "0.4"
thiserror = "2.0"
tokio = { version = "1.52.3", features = ["full"] }
tokio-util = "0.7"
tracing = "0.1"
ureq = "=3.1.4"
url = "2.5.8"
urlencoding = "2.1"
