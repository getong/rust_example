[package]
name = "deno_resolver_deno_npm_example"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22.1"
colored = "=2.2.0"
dashmap = "6.1"
deno_ast = { version = "0.53.1", features = ["transpiling"] }
deno_core = "0.393.0"
deno_error = "=0.7.1"
deno_graph = "0.107.1"
deno_lib = "0.58.0"
deno_napi = "0.171.0"
deno_node = "0.178.0"
deno_npm = "0.52.0"
deno_npm_cache = "0.59.0"
deno_npm_installer = "0.35.0"
deno_package_json = "0.42.0"
deno_permissions = "0.99.0"
deno_resolver = "0.71.0"
deno_runtime = { version = "0.248.0", features = ["transpile"] }
deno_semver = "0.9.1"
deno_task_shell = "0.29.0"
dirs = "6.0.0"
eszip = "0.118.0"
flate2 = "1.1"
futures = "0.3"
hex = "0.4"
http = "1.4"
log = "0.4"
