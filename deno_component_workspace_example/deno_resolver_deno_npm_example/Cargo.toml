reqwest = { version = "0.13.2", features = ["json"] }
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha1 = "0.10"
sha2 = "0.10"
sys_traits = "=0.1.25"
tar = "0.4"
thiserror = "2.0"
tokio = { version = "1.50.0", features = ["full"] }
