[package]
name = "deno_runtime_test"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
colored = "=2.2.0"
deno_ast = { version = "0.53.1", features = ["transpiling"] }
deno_core = "0.393.0"
deno_error = "=0.7.1"
deno_permissions = "0.99.0"
deno_resolver = "0.71.0"
# deno_fs = "0.122.0"
deno_runtime = { version = "0.248.0", features = ["transpile"] }
node_resolver = "0.78.0"
sys_traits = "=0.1.25"
tokio = { version = "1.50.0", features = ["full"] }
ureq = "=3.1.4"
