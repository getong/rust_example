[package]
name = "deno_runtime_axum_example"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1"
axum = { version = "0.8", features = ["macros"] }
deno_ast = { version = "0.53.1", features = ["transpiling"] }
deno_cache_dir = "0.32.0"
deno_crypto = "0.254.0"
deno_error = "=0.7.1"
deno_resolver = "0.71.0"
deno_runtime = { version = "0.248.0", features = ["transpile", "hmr"] }
deno_terminal = "=0.2.3"
dotenvy = "0.15.7"
env_logger = "0.11"
log = "0.4.29"
rand = "0.10"
rustls = "0.23"
serde_json = "1.0"
sys_traits = { version = "=0.1.25", features = ["real"] }
tokio = { version = "1.50.0", features = ["full"] }
ureq = "=3.1.4"
url = "2.5.8"
urlencoding = "2.1.3"
