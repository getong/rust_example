[package]
name = "deno_runtime_deno_lib_example"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
async-trait = "0.1.89"
base64 = "0.22.1"
deno_ast = { version = "=0.53.2", features = ["transpiling"] }
deno_core = "0.403.0"
deno_graph = "=0.108.2"
deno_lib = "0.68.0"
deno_npm = "0.62.0"
deno_npm_cache = "0.69.0"
deno_resolver = "0.81.0"
deno_runtime = { version = "0.258.0", features = ["transpile"] }
deno_semver = "=0.10.0"
dirs = "6.0.0"
flate2 = "1.1"
import_map = "0.25.0"
indexmap = "2"
once_cell = "1.21.4"
reqwest = { version = "0.13.4", features = ["json"] }
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.11"
sys_traits = "0.1.28"
tar = "0.4"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1"
url = "2.5.8"
