[package]
name = "kameo_game_sync"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
kameo = { version = "0.21.0", features = ["remote"] }
rand = { version = "0.10.1", features = ["std_rng"] }
serde = { version = "1", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
