[package]
name = "kameo_tarpc"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
clap = { version = "4.6.1", features = ["derive"] }
futures = "0.3.32"
kameo = { version = "0.21.0", features = ["remote"] }
libp2p = { version = "0.56.0", features = ["macros", "noise", "serde", "tcp", "tokio", "yamux"] }
openraft = { version = "0.10.0-alpha.26", features = ["serde", "type-alias"] }
openraft-rocksstore-crud = { path = "../../openraft_workspace_example/rocksstore_crud" }
prost = "0.14.4"
prost-types = "0.14.4"
rocksdb = "0.24.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tarpc = { version = "0.37.0", features = ["full"] }
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
types-kv = { path = "../../openraft_workspace_example/types-kv" }
wasmtime = "45.0.2"

[build-dependencies]
prost-build = "0.14.4"
