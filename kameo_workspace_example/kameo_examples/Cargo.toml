[package]
name = "kameo_examples"
version = "0.1.0"
edition = "2024"

[features]
default = ["remote", "metrics"]
remote = ["kameo/remote"]
metrics = ["kameo/metrics"]

[dependencies]
futures = "0.3.32"
kameo = "0.20.0"
kameo_actors = "0.5.0"
libp2p = { version = "0.56.0", features = ["serde"] }
metrics-exporter-prometheus = "0.18"
serde = { version = "1.0.228", features = ["derive"] }
subsecond = "0.7.9"
tokio = { version = "1.52.3", features = ["full"] }
tokio-stream = { version = "0.1.18", features = ["time"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
