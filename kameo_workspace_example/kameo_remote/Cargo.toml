[package]
name = "kameo_remote"
version = "0.1.0"
edition = "2024"

[dependencies]
futures = "0.3.32"
kameo = { version = "0.20.0", features = ["remote"] }
libp2p = { version = "0.56.0", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
