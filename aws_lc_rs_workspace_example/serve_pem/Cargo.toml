[package]
name = "serve_pem"
version = "0.1.0"
edition = "2024"
default-run = "serve_pem"

[dependencies]
argon2 = "0.5"
aws-lc-rs = { version = "1", features = ["alloc"] }
axum = "0.8"
axum-server = { version = "0.8", features = ["tls-rustls"] }
base64 = "0.22"
dotenvy = "0.15"
hex = "0.4"
rcgen = "0.14"
rustls = { version = "0.23", default-features = false, features = ["std", "aws-lc-rs"] }
rustls-pki-types = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio-rustls", "migrate"] }
tokio = { version = "1", features = ["full"] }
zeroize = { version = "1", features = ["derive"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
