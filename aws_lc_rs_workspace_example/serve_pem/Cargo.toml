[package]
name = "serve_pem"
version = "0.1.0"
edition = "2024"

[dependencies]
aws-lc-rs = { version = "1", features = ["alloc"] }
axum = "0.8"
base64 = "0.22"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
tokio = { version = "1", features = ["full"] }
zeroize = { version = "1", features = ["derive"] }
