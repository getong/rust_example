[package]
name = "iroh_mainline_kad"
version = "0.1.0"
edition = "2024"

[features]
default = ["tls-ring"]
tls-ring = ["iroh/tls-ring"]
tls-aws-lc-rs = ["iroh/tls-aws-lc-rs"]

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
iroh = { version = "1.0.1", default-features = false, features = [
  "metrics",
  "fast-apple-datapath",
  "portmapper",
] }
iroh-blobs = "0.103.0"
iroh-gossip = "0.101.0"
mainline = "7.0.0"
n0-error = "1.0.0"
n0-future = "0.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
