[package]
name = "iroh_local_swarm_discovery_example"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
console = "0.16.3"
futures-lite = "2.6.1"
