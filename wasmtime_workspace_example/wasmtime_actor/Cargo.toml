[package]
name = "wasmtime_actor"
version = "0.1.0"
edition = "2024"

[features]
default = ["guest-v1"]
guest-v1 = []
guest-v2 = []

[lib]
crate-type = ["cdylib"]

[[bin]]
name = "wasmtime_actor"
path = "src/main.rs"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.23.2", features = ["v7"] }
wasmtime = { version = "45.0.0", features = ["component-model"] }
wasmtime-wasi = "45.0.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wit-bindgen = { version = "0.57.1", default-features = false, features = ["macros"] }

[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports"] }
mockall = "0.14.0"
proptest = "1.11.0"

[[bench]]
name = "call_handle_call"
harness = false
