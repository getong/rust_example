[package]
name = "kameo_wasmtime_hot_upgrade"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "3"
members = [".", "risk_rule_v1", "risk_rule_v2"]

[dependencies]
anyhow = "1.0"
kameo = "0.20"
tokio = { version = "1.52", features = ["full"] }
wasmparser = "0.251.0" 
wasmtime = { version = "45.0.0", features = ["component-model"] }
wasmtime-wasi = "45.0.0"
