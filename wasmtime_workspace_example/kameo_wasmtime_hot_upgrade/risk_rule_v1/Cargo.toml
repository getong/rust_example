[package]
name = "kameo_risk_rule_v1"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
crc32fast = { version = "1.5", default-features = false }
itoa = "1.0"
libm = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wit-bindgen = { version = "0.57.1", default-features = false, features = ["macros"] }
