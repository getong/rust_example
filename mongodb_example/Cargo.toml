[package]
name = "mongodb_example"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bson = "3.1.0"
serde = "1.0.228"
serde_json = "1.0.149"
tokio = { version = "1.51.1", default-features = false, features = ["rt-multi-thread"] }

[dependencies.mongodb]
version = "3.5.2"
default-features = false
features = ["sync", "rustls-tls", "bson-3", "compat-3-3-0"]
